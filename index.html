<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisbon 3D Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    
    #map {
      width: 100vw;
      height: 100vh;
    }
    
    .map-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }
    
    .map-overlay h1 {
      font-size: 1.2rem;
      margin-bottom: 5px;
    }
    
    .map-overlay p {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    
    .controls {
      position: absolute;
      bottom: 30px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
    }
    
    .controls label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    
    .controls input[type="range"] {
      width: 150px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="map-overlay">
    <h1>🇵🇹 Lisbon 3D Explorer</h1>
    <p>Open data • Open source • MapLibre GL</p>
  </div>
  
  <div class="controls">
    <label>
      Pitch: <span id="pitch-value">60</span>°
      <input type="range" id="pitch" min="0" max="85" value="60">
    </label>
    <label>
      Zoom: <span id="zoom-value">15</span>
      <input type="range" id="zoom" min="10" max="18" value="15" step="0.1">
    </label>
    <button id="pov-toggle" style="margin-top: 10px; padding: 10px 16px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; width: 100%; font-weight: bold;">
      🚗 Enter Drive Mode
    </button>
    <p style="margin-top: 10px; font-size: 0.75rem; opacity: 0.8; line-height: 1.4;">
      <b>Drive Mode:</b><br>
      🚗 W/S = gas/brake<br>
      🔄 A/D = steer<br>
      🖱️ Drag = look around<br>
      P = Exit drive mode
    </p>
  </div>

  <!-- Speedometer -->
  <div id="speedometer" style="display: none; position: fixed; bottom: 30px; left: 30px; background: rgba(0, 0, 0, 0.85); color: #00ff88; padding: 15px 25px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; z-index: 1001; border: 2px solid #00ff88; box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);">
    0 km/h
  </div>

  <!-- Score Display -->
  <div id="score-display" style="display: none; position: fixed; top: 30px; right: 30px; background: rgba(0, 0, 0, 0.85); color: #ffd700; padding: 12px 20px; border-radius: 10px; font-family: -apple-system, sans-serif; font-size: 20px; font-weight: bold; z-index: 1001; border: 2px solid #ffd700; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);">
    Score: 0
  </div>

  <!-- Checkpoint Popup -->
  <div id="checkpoint-popup" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px 40px; border-radius: 16px; font-family: -apple-system, sans-serif; font-size: 24px; font-weight: bold; z-index: 2000; text-align: center; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5); animation: popupPulse 0.5s ease-out;">
    <div style="font-size: 40px; margin-bottom: 10px;">🏁</div>
    <div id="checkpoint-text">Checkpoint!</div>
    <div style="font-size: 18px; opacity: 0.9; margin-top: 8px;">+<span id="checkpoint-points">500</span> points</div>
  </div>

  <style>
    @keyframes popupPulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes popupFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
    }
    .checkpoint-fade {
      animation: popupFade 0.5s ease-in forwards !important;
    }
  </style>
  
  <script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
  <script src="./main.js"></script>
</body>
</html>
