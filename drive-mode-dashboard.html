<!--
  Lisbon 3D — Drive Mode Dashboard Structure
  Include this within the body tag, toggle visibility with 'drive-mode-active' class
-->

<!-- SVG Definitions (add to HTML head or before dashboard) -->
<svg width="0" height="0" style="position: absolute;">
  <defs>
    <!-- Speedometer gradient -->
    <linearGradient id="speed-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="50%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#00f5d4" />
    </linearGradient>
    
    <!-- High speed gradient -->
    <linearGradient id="speed-gradient-fast" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="50%" stop-color="#ff006e" />
      <stop offset="100%" stop-color="#ff006e" />
    </linearGradient>
  </defs>
</svg>

<!-- ========================================
     DRIVE MODE HUD
     ======================================== -->
<div id="drive-hud" class="drive-mode-active" style="display: none;">
  
  <!-- Speedometer -->
  <div class="speedometer-container">
    <div class="speedometer-gauge" id="speedometer-gauge">
      <!-- SVG Gauge -->
      <svg class="speedometer-svg" viewBox="0 0 100 100">
        <!-- Background track -->
        <circle cx="50" cy="50" r="45" class="speedometer-track" 
                stroke-dasharray="212 283" />
        <!-- Fill arc -->
        <circle cx="50" cy="50" r="45" class="speedometer-fill" 
                id="speed-fill"
                stroke-dasharray="283" />
      </svg>
      
      <!-- Center display -->
      <div class="speedometer-center">
        <div class="speedometer-value" id="speed-value">0</div>
        <div class="speedometer-unit">km/h</div>
      </div>
    </div>
    <div class="speedometer-label">Speed</div>
  </div>
  
  <!-- Score Display -->
  <div class="score-container">
    <div class="score-panel" id="score-panel">
      <div class="score-icon">🏆</div>
      <div class="score-content">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-value">0</div>
      </div>
    </div>
    <div class="distance-badge">
      <span id="distance-value">0.0</span> km traveled
    </div>
  </div>
  
  <!-- Mini Map -->
  <div class="minimap-container">
    <div class="minimap-frame">
      <!-- Car position (always centered) -->
      <div class="minimap-car"></div>
      
      <!-- Landmarks (positioned relative to car) -->
      <div class="minimap-landmark" id="landmark-1" 
           style="top: 20%; left: 30%; background: #9b59b6;"></div>
      <div class="minimap-landmark" id="landmark-2" 
           style="top: 60%; left: 70%; background: #3498db;"></div>
      <div class="minimap-landmark" id="landmark-3" 
           style="top: 40%; left: 80%; background: #f39c12;"></div>
    </div>
    <div class="minimap-label">Radar</div>
  </div>
  
  <!-- Drive Controls Hint -->
  <div class="drive-controls">
    <div class="control-pill">
      <span class="control-key">W</span>
      <span>Gas</span>
    </div>
    <div class="control-pill">
      <span class="control-key">S</span>
      <span>Brake</span>
    </div>
    <div class="control-pill">
      <span class="control-key">A</span>
      <span class="control-key">D</span>
      <span>Steer</span>
    </div>
    <div class="control-pill">
      <span class="control-key">P</span>
      <span>Exit</span>
    </div>
  </div>
  
</div>

<!-- ========================================
     CAR INTERIOR FRAME OVERLAYS
     ======================================== -->
<div class="windshield-frame" id="windshield-frame"></div>
<div class="dashboard-silhouette" id="dashboard-silhouette"></div>
<div class="steering-wheel-hint" id="steering-wheel-hint"></div>

<!-- ========================================
     SPEED LINES EFFECT
     ======================================== -->
<div class="speed-lines" id="speed-lines">
  <!-- Lines generated via JS for performance -->
</div>

<!-- ========================================
     CHECKPOINT POPUP
     ======================================== -->
<div class="checkpoint-overlay" id="checkpoint-overlay" style="display: none;">
  <div class="checkpoint-card" id="checkpoint-card">
    <div class="checkpoint-icon">🏁</div>
    <div class="checkpoint-title">
      Checkpoint: <span class="checkpoint-name" id="checkpoint-name">Landmark</span>!
    </div>
    <div class="checkpoint-points" id="checkpoint-points">+500</div>
    <div class="checkpoint-points-label">points</div>
  </div>
</div>

<!-- ========================================
     VIRAL MOMENT OVERLAY
     ======================================== -->
<div class="viral-moment" id="viral-moment" style="display: none;">
  <div class="viral-badge">
    <span class="viral-emoji" id="viral-emoji">💨</span>
    <div class="viral-title" id="viral-title">Speed Demon!</div>
    <div class="viral-subtitle" id="viral-subtitle">You hit 80 km/h</div>
  </div>
  <div class="viral-hint">
    📸 Screenshot this moment!
  </div>
</div>

<!-- ========================================
     DISTANCE MILESTONE TOAST
     ======================================== -->
<div class="milestone-toast" id="milestone-toast" 
     style="display: none; position: fixed; top: 120px; right: 40px;">
  <div style="background: var(--glass-dark); border: 1px solid var(--neon-purple); 
              border-radius: var(--radius-md); padding: var(--space-md) var(--space-lg);
              box-shadow: var(--shadow-glow-purple); animation: hudEntrance 0.4s ease-out;
              display: flex; align-items: center; gap: var(--space-md);">
    <span style="font-size: 28px;">🎯</span>
    <div>
      <div style="font-family: var(--font-display); font-size: 14px; color: var(--neon-purple); 
                  font-weight: 600;">MILESTONE</div>
      <div style="font-family: var(--font-mono); font-size: 20px; color: white; font-weight: 700;">
        <span id="milestone-distance">1.0</span> km
      </div>
    </div>
  </div>
</div>
