<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisbon 3D Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    
    #map {
      width: 100vw;
      height: 100vh;
    }
    
    .map-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }
    
    .map-overlay h1 {
      font-size: 1.2rem;
      margin-bottom: 5px;
    }
    
    .map-overlay p {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    
    .controls {
      position: absolute;
      bottom: 30px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
    }
    
    .controls label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    
    .controls input[type="range"] {
      width: 150px;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DzuO_6Pu.js"></script>
</head>
<body>
  <div id="map"></div>
  
  <div class="map-overlay">
    <h1>🇵🇹 Lisbon 3D Explorer</h1>
    <p>Open data • Open source • MapLibre GL</p>
  </div>
  
  <div class="controls">
    <label>
      Pitch: <span id="pitch-value">60</span>°
      <input type="range" id="pitch" min="0" max="85" value="60">
    </label>
    <label>
      Zoom: <span id="zoom-value">15</span>
      <input type="range" id="zoom" min="10" max="18" value="15" step="0.1">
    </label>
  </div>
  
</body>
</html>
