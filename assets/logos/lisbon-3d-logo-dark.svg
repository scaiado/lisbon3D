<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Dark variant for dark backgrounds -->
  <defs>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4"/>
      <stop offset="100%" style="stop-color:#1E4D6B"/>
    </linearGradient>
    <pattern id="azulejoPatternDark" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#4A90A4"/>
      <circle cx="10" cy="10" r="4" fill="#1E4D6B" opacity="0.5"/>
      <circle cx="0" cy="0" r="3" fill="#1E4D6B" opacity="0.3"/>
      <circle cx="20" cy="0" r="3" fill="#1E4D6B" opacity="0.3"/>
      <circle cx="0" cy="20" r="3" fill="#1E4D6B" opacity="0.3"/>
      <circle cx="20" cy="20" r="3" fill="#1E4D6B" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGradDark)"/>
  <circle cx="60" cy="60" r="58" fill="url(#azulejoPatternDark)" opacity="0.4"/>
  
  <!-- 3D Building silhouette -->
  <g transform="translate(60, 65)">
    <ellipse cx="0" cy="35" rx="45" ry="12" fill="#0F2D3D" opacity="0.3"/>
    
    <!-- Building 1 -->
    <path d="M-35 35 L-35 -5 L-25 -15 L-15 -5 L-15 35 Z" fill="#F5F0EB"/>
    <path d="M-35 -5 L-25 -15 L-15 -5" fill="#E8DDD4"/>
    <rect x="-32" y="0" width="6" height="8" rx="1" fill="#1E4D6B"/>
    <rect x="-22" y="0" width="6" height="8" rx="1" fill="#1E4D6B"/>
    <rect x="-32" y="15" width="6" height="8" rx="1" fill="#1E4D6B"/>
    <rect x="-22" y="15" width="6" height="8" rx="1" fill="#1E4D6B"/>
    
    <!-- Building 2 -->
    <path d="M-12 35 L-12 -20 L0 -30 L12 -20 L12 35 Z" fill="#FFFFFF"/>
    <path d="M-12 -20 L0 -30 L12 -20" fill="#F5F0EB"/>
    <rect x="-9" y="-10" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="-1" y="-10" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="7" y="-10" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="-9" y="5" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="-1" y="5" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="7" y="5" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="-9" y="20" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="-1" y="20" width="5" height="7" rx="1" fill="#1E4D6B"/>
    <rect x="7" y="20" width="5" height="7" rx="1" fill="#1E4D6B"/>
    
    <!-- Building 3 -->
    <path d="M15 35 L15 -8 L25 -18 L35 -8 L35 35 Z" fill="#F5F0EB"/>
    <path d="M15 -8 L25 -18 L35 -8" fill="#E8DDD4"/>
    <path d="M17 0 Q20 -3 23 0 L23 8 L17 8 Z" fill="#E07A5F"/>
    <path d="M27 0 Q30 -3 33 0 L33 8 L27 8 Z" fill="#E07A5F"/>
    <path d="M17 15 Q20 12 23 15 L23 23 L17 23 Z" fill="#E07A5F"/>
    <path d="M27 15 Q30 12 33 15 L33 23 L27 23 Z" fill="#E07A5F"/>
  </g>
  
  <!-- 3D axis -->
  <g transform="translate(85, 85)">
    <line x1="0" y1="0" x2="15" y2="-8" stroke="#E07A5F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-12" y2="-12" stroke="#E8C9A0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="18" stroke="#4A90A4" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <circle cx="60" cy="60" r="54" stroke="#E8C9A0" stroke-width="2" fill="none" opacity="0.8"/>
  <circle cx="60" cy="60" r="58" stroke="#1E4D6B" stroke-width="2" fill="none" opacity="0.2"/>
</svg>